[agent]
name = "browser-agent"
lang = "python"
entry = "agent.py"

[source]
git = "https://github.com/nextbysam/orb-browser.git"
branch = "main"

[build]
steps = [
  "pip install playwright browser-use fastapi uvicorn uv",
  "playwright install chromium"
]
working_dir = "/agent/code"

[agent.env]
PLAYWRIGHT_BROWSERS_PATH = "/home/awlsen/.cache/ms-playwright"
BROWSER_USE_EXECUTABLE_PATH = "/home/awlsen/.cache/ms-playwright/chromium-1208/chrome-linux64/chrome"

[lifecycle]
idle_timeout = "3600s"

[backend]
provider = "custom"

[ports]
expose = [8000]
