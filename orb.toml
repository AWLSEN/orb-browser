[agent]
name = "browser-agent"
lang = "python"
entry = "agent.py"

[source]
git = "https://github.com/nextbysam/orb-browser.git"
branch = "main"

[build]
steps = [
  "pip install playwright fastapi uvicorn httpx agentmail",
  "PLAYWRIGHT_BROWSERS_PATH=/opt/browsers playwright install chromium",
  "npm install -g @anthropic-ai/claude-code",
]
working_dir = "/agent/code"

[agent.env]
PLAYWRIGHT_BROWSERS_PATH = "/opt/browsers"

[lifecycle]
idle_timeout = "3600s"

[backend]
provider = "custom"
additional_domains = ["openrouter.ai", "api.z.ai", "open.bigmodel.cn"]

[ports]
expose = [8000]
